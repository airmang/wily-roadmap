    등록 성공 또는 이미 등록됨은 조용히 통과한다. wily-agent 미설치, 미로그인, 설정 없음, register 실패는 init을 실패시키지
    않고 수동 등록 필요 안내만 출력한다. daemon은 registry 변경 감시 또는 주기적 갱신으로 새 repo watcher를 붙인다.
